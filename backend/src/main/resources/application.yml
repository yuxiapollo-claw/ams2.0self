spring:
  application:
    name: ams-backend
  datasource:
    url: ${AMS_DATASOURCE_URL:jdbc:h2:mem:ams;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${AMS_DATASOURCE_USERNAME:sa}
    password: ${AMS_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true
server:
  port: 8080
